<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certifications | Nico Nuñez</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">NICO NUÑEZ</div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="techstack.html">Tech Stack</a></li>
            <li><a href="certs.html" class="active-link">Certifications</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>
    <main class="certs-container">
        <div class="section-title">
            <h1>Certifications</h1>
            <div class="underline"></div>
        </div>
        <!-- Certificate Grid -->
        <div class="certs-grid">
            <div class="cert-card">
                <div class="cert-img-container">
                    <img src="images/python-cert.jpg" alt="Python Certificate" class="expandable-image">
                </div>
                <div class="cert-info">
                    <h3><a href="https://www.credly.com/badges/99a325bd-b1e7-4bbb-8659-877693d8e035/public_url" target="_blank" rel="noopener noreferrer">Python Essentials 1</a></h3>
              
                </div>
            </div>

            <div class="cert-card">
                <div class="cert-img-container">
                    <img src="images/word-cert_page.jpg" alt="Microsoft Certificate" class="expandable-image">
                </div>
                <div class="cert-info">
                    <h3><a href="https://www.credly.com/badges/253ed6f3-fa52-4776-bf02-82068700db6c/public_url" target="_blank" rel="noopener noreferrer">Microsoft Office Specialist</a></h3>
            
                </div>
            </div>

            <div class="cert-card">
                <div class="cert-img-container">
                    <img src="images/powerpoint-cert.jpg" alt="PowerPoint Certificate" class="expandable-image">
                </div>
                <div class="cert-info">
                    <h3><a href="https://www.credly.com/badges/eec73998-35eb-4201-8ef0-281641825b37/public_url" target="_blank" rel="noopener noreferrer">Powerpoint Specialist</a></h3>
              
                </div>
            </div>
        </div>
        <!-- Image Expansion Modal -->
        <div id="imageModal" class="image-modal">
            <span class="close-modal">&times;</span>
            <img id="modalImage" src="" alt="Expanded Certificate">
            <a id="modalLink" class="modal-link" href="#" target="_blank" rel="noopener noreferrer">View Certificate</a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

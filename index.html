<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <header class="header">
        <a href="#" class="logo"><span>Nico Nuñez</span></a>

                <i class="fa-solid fa-laptop"></i>
                <span>Graphic Design</span>
                <h3>2 years</h3>
                <p>lorem</p>
            </div>

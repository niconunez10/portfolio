<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Stack | Nico Nuñez</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">NICO NUÑEZ</div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="techstack.html" class="active-link">Tech Stack</a></li>
            <li><a href="certs.html">Certifications</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>

    <main class="tech-container">
        <div class="section-title">
            <h1>Tech Stack</h1>
            <div class="underline"></div>
        </div>

        <div class="tech-grid">
            <!-- Java -->
            <div class="tech-card">
                <i class="fa-brands fa-java"></i>
                <h3>Java</h3>
            </div>

            <!-- C -->
            <div class="tech-card">
                <div class="c-icon">C</div>
                <h3>C</h3>
            </div>

            <!-- PHP -->
            <div class="tech-card">
                <i class="fab fa-php"></i>
                <h3>PHP</h3>
            </div>

            <!-- SQL -->
            <div class="tech-card">
                <img src="images/mysql-icon.png" alt="MySQL" class="tech-logo">
                <h3>MySQL</h3>
            </div>

            <!-- Git -->
            <div class="tech-card">
                <i class="fab fa-git-alt"></i>
                <h3>Git</h3>
            </div>

            <!-- GitHub -->
            <div class="tech-card">
                <i class="fab fa-github"></i>
                <h3>GitHub</h3>
            </div>

            <!-- VS Code -->
            <div class="tech-card">
                <img src="images/vscode.png" alt="VS Code" class="tech-logo">
                <h3>VS Code</h3>
            </div>

            <!-- HTML -->
            <div class="tech-card">
                <i class="fab fa-html5"></i>
                <h3>HTML</h3>
            </div>

            <!-- CSS -->
            <div class="tech-card">
                <i class="fab fa-css3-alt"></i>
                <h3>CSS</h3>
            </div>

            <!-- JavaScript -->
            <div class="tech-card">
                <i class="fab fa-js-square"></i>
                <h3>JavaScript</h3>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
